version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - npm install
    build:
      - npm run build
run:
  command: npm run start
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: HOST
      value: 0.0.0.0
  secrets:
    - name: INTERNAL_API_TOKEN
      value-from: /zawyafi/prod/internal_api_token
    - name: SUMSUB_WEBHOOK_SECRET
      value-from: /zawyafi/prod/sumsub_webhook_secret
